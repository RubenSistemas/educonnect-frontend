<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduConnect Pro – CEA Pailón | Iniciar Sesión</title>
  <meta name="description" content="Portal educativo institucional del Centro de Educación Alternativa Pailón. Acceso para estudiantes, docentes y directivos.">
  <link rel="icon" type="image/png" href="cea_logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060810;
      --card: rgba(14, 18, 32, 0.75);
      --accent: #1e40af;
      --accent2: #d4a017;
      --accent-hover: #1e3a8a;
      --accent-glow: rgba(30, 64, 175, 0.45);
      --gold-glow: rgba(212, 160, 23, 0.35);
      --text: #f0f4f8;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.09);
      --border-gold: rgba(212, 160, 23, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse at 10% 20%, rgba(30, 64, 175, 0.12), transparent 55%),
        radial-gradient(ellipse at 90% 80%, rgba(212, 160, 23, 0.08), transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(30, 64, 175, 0.04), transparent 70%);
      overflow: hidden;
      position: relative;
    }

    /* Animated background particles */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(1.5px 1.5px at 25% 35%, rgba(212, 160, 23, 0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 20%, rgba(30, 64, 175, 0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 70%, rgba(212, 160, 23, 0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 85% 55%, rgba(30, 64, 175, 0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 80%, rgba(212, 160, 23, 0.25) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
      animation: starTwinkle 6s ease-in-out infinite alternate;
    }

    @keyframes starTwinkle {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }

    /* Grid lines subtle */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(30, 64, 175, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30, 64, 175, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    /* ── Main wrapper ── */
    .page-wrap {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 460px;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* ── Institution badge (top) ── */
    .inst-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(30, 64, 175, 0.1);
      border: 1px solid rgba(30, 64, 175, 0.25);
      border-radius: 50px;
      padding: 6px 16px 6px 8px;
      font-size: 0.8rem;
      color: #93c5fd;
      letter-spacing: 0.4px;
    }

    .inst-badge .dot {
      width: 7px;
      height: 7px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    /* ── Login Card ── */
    .login-card {
      width: 100%;
      padding: 44px 40px 36px;
      background: var(--card);
      border: 1px solid var(--border);
      border-top: 2px solid var(--border-gold);
      border-radius: 28px;
      box-shadow:
        0 30px 70px -10px rgba(0, 0, 0, 0.7),
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 0 60px rgba(30, 64, 175, 0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      position: relative;
      overflow: hidden;
    }

    /* Gold accent corner */
    .login-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent2), transparent);
      opacity: 0.8;
    }

    /* Blue glow behind logo */
    .login-card::after {
      content: "";
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(30, 64, 175, 0.15), transparent 70%);
      pointer-events: none;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
      position: relative;
    }

    .logo-ring {
      width: 92px;
      height: 92px;
      margin: 0 auto 18px;
      position: relative;
    }

    .logo-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid transparent;
      background-clip: padding-box;
      box-shadow:
        0 0 0 2px var(--accent2),
        0 0 25px rgba(212, 160, 23, 0.3),
        0 0 50px rgba(30, 64, 175, 0.2);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .logo-ring img:hover {
      transform: scale(1.06) rotate(3deg);
      box-shadow:
        0 0 0 3px var(--accent2),
        0 0 35px rgba(212, 160, 23, 0.5),
        0 0 60px rgba(30, 64, 175, 0.3);
    }

    /* Rotating ring decoration */
    .logo-ring::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px dashed rgba(212, 160, 23, 0.25);
      animation: rotateSlow 12s linear infinite;
    }

    @keyframes rotateSlow {
      to { transform: rotate(360deg); }
    }

    .header h1 {
      font-size: 2.1rem;
      font-weight: 900;
      letter-spacing: -0.8px;
      background: linear-gradient(135deg, #fff 30%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .header .school-name {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 2px;
    }

    .header .subtitle {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    label .lbl-icon {
      font-size: 0.9rem;
    }

    .input-wrapper {
      position: relative;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 13px 16px 13px 44px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: #fff;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder {
      color: rgba(148, 163, 184, 0.5);
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      color: var(--text-muted);
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .input-wrapper:focus-within .input-icon {
      color: var(--accent2);
      transform: translateY(-50%) scale(1.1);
    }

    input:focus {
      outline: none;
      border-color: rgba(30, 64, 175, 0.6);
      background: rgba(0, 0, 0, 0.5);
      box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.12), 0 0 20px rgba(30, 64, 175, 0.08);
    }

    input.invalid {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12);
    }

    /* ── Options row ── */
    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 26px;
      font-size: 0.83rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      cursor: pointer;
    }

    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent2);
      cursor: pointer;
      padding: 0;
    }

    .forgot-pass {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .forgot-pass:hover {
      color: var(--accent2);
    }

    /* ── Button ── */
    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #1e40af, #1e3a8a);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.35s ease;
      box-shadow: 0 4px 20px rgba(30, 64, 175, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.3px;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
      background-size: 200% 100%;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 35px rgba(30, 64, 175, 0.45), 0 0 20px rgba(212, 160, 23, 0.1);
      background: linear-gradient(135deg, #2563eb, #1e40af);
    }

    .btn:hover::after {
      opacity: 1;
      animation: shimmer 1.5s linear infinite;
    }

    .btn:active {
      transform: translateY(1px);
    }

    /* ── Error Toast ── */
    .error-toast {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.84rem;
      margin-bottom: 18px;
      display: none;
      align-items: center;
      gap: 8px;
      animation: fadeInUp 0.3s ease;
    }

    .error-toast.visible {
      display: flex;
    }

    /* ── Footer info ── */
    .card-footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .contact-row a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
    }

    .contact-row a:hover {
      color: #f5c842;
      text-shadow: 0 0 12px rgba(212, 160, 23, 0.5);
    }

    .whatsapp-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(37, 211, 102, 0.08);
      border: 1px solid rgba(37, 211, 102, 0.2);
      color: #4ade80;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.25s;
      margin-top: 4px;
    }

    .whatsapp-btn:hover {
      background: rgba(37, 211, 102, 0.15);
      box-shadow: 0 0 15px rgba(37, 211, 102, 0.2);
      transform: translateY(-1px);
      color: #4ade80;
    }

    /* ── Bottom brand ── */
    .bottom-brand {
      font-size: 0.72rem;
      color: rgba(148, 163, 184, 0.4);
      text-align: center;
      letter-spacing: 0.3px;
      z-index: 10;
      position: relative;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .login-card {
        padding: 36px 24px 28px;
        border-radius: 20px;
      }
      .header h1 { font-size: 1.8rem; }
      .logo-ring { width: 80px; height: 80px; }
    }
  </style>
</head>

<body>

  <div class="page-wrap">

    <!-- System status badge -->
    <div class="inst-badge">
      <span class="dot"></span>
      Sistema Activo · CEA Herman Ortiz C. Pailón
    </div>

    <div class="login-card">
      <div class="header">
        <div class="logo-ring">
          <img src="cea_logo.png" alt="Logo CEA Pailón">
        </div>
        <h1>EduConnect</h1>
        <div class="school-name">CEA · Pailón · Bolivia</div>
        <div class="subtitle">Sistema Académico Institucional</div>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">Acceso Seguro</span>
        <div class="divider-line"></div>
      </div>

      <!-- Error box -->
      <div id="errorBox" class="error-toast">
        <span>⚠️</span>
        <span id="errorMsg">Error</span>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label>
            <span class="lbl-icon">✉️</span>
            Correo Institucional
          </label>
          <div class="input-wrapper">
            <span class="input-icon">@</span>
            <input type="text" id="username" placeholder="usuario@educonnect.com" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label>
            <span class="lbl-icon">🔒</span>
            Contraseña
          </label>
          <div class="input-wrapper">
            <span class="input-icon">●●●</span>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>

        <div class="options-row">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe"> Recordarme
          </label>
          <a href="#" class="forgot-pass" onclick="alert('Para recuperar su acceso, contacte a la secretaría al 📞 74420831.')">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" id="loginBtn" class="btn">
          <span id="btnText">🚀 Ingresar al Portal</span>
        </button>
      </form>

      <!-- Footer contact -->
      <div class="card-footer">
        <div class="contact-row">
          📞 Soporte institucional:
          <a href="tel:+59174420831">+591 74420831</a>
        </div>
        <a href="https://wa.me/59174420831" target="_blank" class="whatsapp-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.115.554 4.102 1.524 5.832L.057 24l6.305-1.654A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.369l-.36-.213-3.738.98 1-3.638-.234-.374A9.818 9.818 0 1112 21.818z"/></svg>
          WhatsApp 74420831
        </a>
      </div>
    </div>

    <div class="bottom-brand">
      EduConnect Pro · CEA Pailón · &copy; 2025 · Todos los derechos reservados
    </div>

  </div>

  <script>
    const API = 'https://educonnect-backend-1.onrender.com';

    function showError(msg) {
      const box = document.getElementById('errorBox');
      document.getElementById('errorMsg').textContent = msg;
      box.classList.add('visible');
    }

    function hideError() {
      document.getElementById('errorBox').classList.remove('visible');
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText');

      usernameInput.classList.remove('invalid');
      passwordInput.classList.remove('invalid');
      hideError();

      if (!username || !password) {
        if (!username) usernameInput.classList.add('invalid');
        if (!password) passwordInput.classList.add('invalid');
        showError('Complete los campos requeridos para continuar.');
        return;
      }

      btnText.textContent = '⏳ Autenticando...';
      btn.disabled = true;

      try {
        const res = await fetch(`${API}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));

          btnText.textContent = '✅ ¡Bienvenido!';
          btn.style.background = 'linear-gradient(135deg, #16a34a, #15803d)';

          setTimeout(() => {
            const pages = {
              director: 'director.html',
              secretaria: 'secretaria.html',
              profesor: 'profesor.html',
              estudiante: 'estudiante.html'
            };
            window.location.href = pages[data.user.role] || 'index.html';
          }, 900);

        } else {
          showError(data.message || 'Credenciales incorrectas. Intente de nuevo.');
          passwordInput.classList.add('invalid');
          btnText.textContent = '🚀 Ingresar al Portal';
          btn.disabled = false;
        }
      } catch (err) {
        showError('Sin conexión al servidor. Intente más tarde.');
        btnText.textContent = '🚀 Ingresar al Portal';
        btn.disabled = false;
      }
    });

    // Micro-animation on input focus
    document.querySelectorAll('input[type="text"], input[type="password"]').forEach(input => {
      input.addEventListener('focus', function () {
        this.closest('.input-wrapper').style.transform = 'translateY(-2px)';
        this.closest('.input-wrapper').style.transition = 'transform 0.25s ease';
      });
      input.addEventListener('blur', function () {
        this.closest('.input-wrapper').style.transform = 'translateY(0)';
      });
    });
  </script>

</body>
</html>
