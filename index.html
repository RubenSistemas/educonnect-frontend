<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduConnect Pro - Iniciar Sesión</title>
  <link rel="icon" type="image/png" href="cea_logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c12;
      --card: rgba(21, 26, 38, 0.65);
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --accent-glow: rgba(34, 197, 94, 0.4);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(circle at 15% 25%, rgba(34, 197, 94, 0.06), transparent 50%),
        radial-gradient(circle at 85% 75%, rgba(59, 130, 246, 0.06), transparent 50%);
      overflow: hidden;
    }

    /* Micro-animation for initial load */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      padding: 48px 40px;
      /* Authentic Glassmorphism */
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      z-index: 10;
      position: relative;
    }
    
    /* Background light leak to enhance "Wow" factor */
    .login-card::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, rgba(34, 197, 94, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .header img {
      width: 80px; 
      height: 80px; 
      border-radius: 50%; 
      object-fit: cover; 
      border: 2px solid rgba(255,255,255,0.1); 
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); 
      margin-bottom: 16px;
      transition: transform 0.3s ease;
    }

    .header img:hover {
      transform: scale(1.05);
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 500;
      margin-top: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: block;
    }

    .input-wrapper {
      position: relative;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    /* Icon in inputs */
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      color: var(--text-muted);
      transition: color 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(0, 0, 0, 0.5);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
    }

    input:focus + .input-icon {
      color: var(--accent);
    }

    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      font-size: 0.85rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      cursor: pointer;
      margin-bottom: 0;
    }

    .remember-me input {
      accent-color: var(--accent);
      cursor: pointer;
      width: 16px;
      height: 16px;
    }

    .forgot-pass {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .forgot-pass:hover {
      color: var(--accent);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(34, 197, 94, 0.35);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .error-toast {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fc8181;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 20px;
      display: none;
      animation: fadeIn 0.3s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Validations via CSS */
    input.invalid {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="header">
      <img src="cea_logo.png" alt="Logo CEA">
      <h1>EduConnect</h1>
      <p>Pro Edition</p>
    </div>
    
    <div id="errorBox" class="error-toast"></div>
    
    <!-- Semántica correcta usando <form> -->
    <form id="loginForm">
      <div class="form-group">
        <label>Correo Institucional</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input type="text" id="username" placeholder="nombreapellido@educonnect.com" required>
        </div>
      </div>
      
      <div class="form-group">
        <label>Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
      </div>

      <div class="options-row">
        <label class="remember-me">
          <input type="checkbox" id="rememberMe"> Recordarme
        </label>
        <a href="#" class="forgot-pass" onclick="alert('Funcionalidad en desarrollo. Contacte a soporte.');">¿Olvidaste tu contraseña?</a>
      </div>
      
      <button type="submit" id="loginBtn" class="btn">Ingresar al Portal</button>
    </form>
  </div>

  <script>
    // URL Relativa para operar como monorepo servido desde Flask
    const API = '';
    
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault(); // Evita recargar la página

      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorBox');

      // Limpiar estados de error
      usernameInput.classList.remove('invalid');
      passwordInput.classList.remove('invalid');

      if (!username || !password) {
        if (!username) usernameInput.classList.add('invalid');
        if (!password) passwordInput.classList.add('invalid');
        err.textContent = 'Ingrese sus credenciales en los campos requeridos';
        err.style.display = 'block';
        return;
      }

      btn.textContent = 'Autenticando...';
      btn.disabled = true;
      err.style.display = 'none';

      try {
        const res = await fetch(`${API}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        
        if (res.ok && data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          if(document.getElementById('rememberMe').checked) {
              // Futuro: lógica para guardar en cookies persistentes
          }

          // Transición suave
          btn.style.background = '#16a34a';
          btn.textContent = '¡Bienvenido!';
          
          setTimeout(() => {
              const pages = { director: 'director.html', secretaria: 'secretaria.html', profesor: 'profesor.html', estudiante: 'estudiante.html' };
              window.location.href = pages[data.user.role] || 'index.html';
          }, 800);
          
        } else {
          err.textContent = data.message || 'Credenciales incorrectas';
          err.style.display = 'block';
          passwordInput.classList.add('invalid');
        }
      } catch (e) {
        err.textContent = 'Sin conexión con el servidor. Intente más tarde.';
        err.style.display = 'block';
      }
      
      if(btn.textContent !== '¡Bienvenido!') {
          btn.textContent = 'Ingresar al Portal';
          btn.disabled = false;
      }
    });

    // Pequeña animación sobre los inputs
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.style.transform = 'translateY(-2px)';
        this.parentElement.style.transition = 'transform 0.2s';
      });
      input.addEventListener('blur', function() {
        this.parentElement.style.transform = 'translateY(0)';
      });
    });
  </script>
</body>

</html>
